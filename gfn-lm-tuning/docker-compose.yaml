services:
  app:
    build: .
    container_name: gfn_lm_tuning
    command: "jupyter-notebook --ip='0.0.0.0' --port=6969 --no-browser --allow-root"
    ports:
      - 6969:6969
    environment:
      # These tell the container to use the GPU and where to find WSL drivers
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # - LD_LIBRARY_PATH=/usr/lib/wsl/lib
      - LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/lib/wsl/lib:$LD_LIBRARY_PATH
    volumes:
      - .:/code
      # Mount the Windows GPU drivers into the Linux container
      - /usr/lib/wsl/lib:/usr/lib/wsl/lib:ro
      - /usr/lib/wsl/drivers:/usr/lib/wsl/drivers:ro
    devices:
      # Pass the WSL DirectX/GPU device inside
      - /dev/dxg:/dev/dxg
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
